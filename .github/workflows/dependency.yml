# Check the packages and dependencies are secured and audited for security.

name: Dependency scan
on:
    workflow_call:

jobs:
    scan-dependency:
        runs-on: ubuntu-latest
        steps:
            - name: checkout the code
              uses: actions/checkout@v7

            - name: setup go language  
              uses: actions/setup-go@v6
              with:
    # Version or version range of Go to use
               go-version: '1.23'
               go-version-file: 'go mod'
               cache-dependency-path: go.sum

            - name: install go vulnerability check
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: run the vulnerability
              run: govulncheck ./...
              working-directory: backend

    # Version or version range of Go to use
            - name: set-up node js
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: './frontend/package-lock.json'

            - name: Run dependency check for node
              run: npm audit
              working-directory: frontend
