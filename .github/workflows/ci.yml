name: CI
on:
    push:
        branches: [master]

jobs:
   frontend:
        #It will runs on github runner
        runs-on: ubuntu-latest
        steps:
             - name: code checkout
               uses: actions/checkout@v7
             
             - name: set-up node js
               uses: actions/setup-node@v6
               with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: 'frontend\package-lock.json'

             - name: install npm packages
               run: npm install
               working-directory: frontend

             - name: Run linter
               run: npm run lint
               working-directory: frontend

             - name: test the linter
               run: npm run test
               working-directory: frontend


