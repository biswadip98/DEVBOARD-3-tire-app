#To check the code quality in SAST process
name: Code Quality

on: workflow_call

jobs:
    sast:
        
        runs-on: ubuntu-latest
        # strategy:
        #     fail-fast: false
        #     matrix:
        #         languages: ['node','go',]
            
        steps:
            

            - name: To checkout the code
              uses: actions/checkout@v7
              
            - name: set-up node js
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: './frontend/package-lock.json'

            - name: install npm packages
              run: npm install --legacy-peer-deps
              working-directory: frontend

            - name: Run linter
              run: npm run lint
              working-directory: frontend

            - name: test the linter
              run: npm run test
              working-directory: frontend
            
            - name: set-up go
              uses: actions/setup-go@v6
              with:
                go-version : '1.23'
                go-version-file : 'go.mod'
                cache-dependency-path: go.sum

            - name: Run Go Vet
              run: go vet ./...
              working-directory: backend

            - name: Run go formatter (Using for formatting the code, Instead of linting. - syntax check)
              run: go fmt
              working-directory: backend

            - name: Run test
              run: go test
              working-directory: backend  
            