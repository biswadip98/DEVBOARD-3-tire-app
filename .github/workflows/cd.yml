#Deploy the built docker images. 
name: CI-Deploy

on:
  workflow_call:
    # # Optional: Define inputs or secrets if your workflow expects them
    # inputs:
    #   config-path:
    #     required: false
    #     type: string
    # secrets:
    #   env-secret:
    #     required: false

# workflow_run:
#   workflow_run:
#     workflows: ["ci.yml"] # Exact name of the CI workflow YAML file
#     types:
#       - completed # Triggers when the CI workflow finishes
#     branches: [main]

jobs:
    Deploy:
        runs-on: self-hosted
        steps:
            - name: Deploy the built images
              uses: actions/checkout@v7

            - name: copy example env to main env
              run: cp .env.example .env

            - name: Docker set-up (login)
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: deply the container with Docker Compose
              run: |
               docker compose pull
               docker compose up -d

