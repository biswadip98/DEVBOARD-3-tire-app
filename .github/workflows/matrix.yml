#Use multiple versions and linting ultiple versions

name: Matrix

on: workflow_dispatch

jobs:
    matrix:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                versions: ['1.22','1.23','1.24','1.25']
        steps:
            - name: set-up go
              uses: actions/setup-go@v6
              with:
                go-version: ${{ matrix.versions }}
                go-version-file: 'go.mod'
                cache-dependency-path: 'go.sum'

            - name: Run go formatter
              run: go fmt
              working-directory: backend

            - name: Run go vet
              run: go vet
              working-directory: backend




        


    