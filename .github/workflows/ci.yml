name: CI
on:
    push:
        branches: [master]

jobs:
   frontend:
        runs-on: ubuntu-latest
        steps:
             - name: code checkout
               uses: actions/checkout@v4
             
             - name: set-up node js
               uses: actions/setup-node@v6
               with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: 'frontend\package-lock.json'

             - name: install npm packages
               run: npm run install

             - name: Run linter
               run: npm run lint

             - name: test the linter
               run: npm run test


