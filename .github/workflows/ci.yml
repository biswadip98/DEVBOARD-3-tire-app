name: CI
on:
    push:
        branches: [master]

jobs:
   frontend:
        #It will runs on github runner
        runs-on: ubuntu-latest
        steps:
             - name: code checkout
               uses: actions/checkout@v7
             
             - name: set-up node js
               uses: actions/setup-node@v6
               with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: './frontend/package-lock.json'

             - name: install npm packages
               run: npm install --legacy-peer-deps
               working-directory: frontend

             - name: Run linter
               run: npm run lint
               working-directory: frontend

             - name: test the linter
               run: npm run test
               working-directory: frontend

             - name: Docker set-up (login)
               uses: docker/login-action@v4
               with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

             - name: Build and push Docker image into the docker hub
               uses: docker/build-push-action@v6
               with:
                context: ./frontend
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/devboard-frontend:latest  
                
                

   backend:
        runs-on: ubuntu-latest
        needs: frontend
        steps:
            - name: Pull the coode/ Checkout code
              uses: actions/checkout@v7

            - name: set-up go 
              uses: actions/setup-go@v6
              with:
                go-version : '1.23'
                go-version-file : 'go.mod'
                cache-dependency-path: go.sum

            - name: Run go-vet (code check)
              run: run go vet
              working-directory: backend

            - name: Run go formatter (Using for formatting the code, Instead of linting. - syntax check)
              run: got fmt
              working-directory: backend

            - name: Run test
              run: go test
              working-directory: backend
            
            - name: docker set-up (login)
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Docker image into the docker hub
              uses: docker/build-push-action@v6
              with:
                context: ./backend
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/devboard-backend:latest





          
         
